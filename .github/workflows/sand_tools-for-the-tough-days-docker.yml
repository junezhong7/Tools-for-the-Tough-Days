name: Build, Push, and Deploy Docker Image (SAND)

on:
  push:
    branches:
      - sand
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      ACR_LOGIN_SERVER: acrtoolsforthetoughdays-baa3ghbcfdjfdghw.azurecr.io
      IMAGE_NAME: tools-for-the-tough-days
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DOCKER }}
      AZURE_TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_640FDCE7414E488197DE8F47BFFAD2AF }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CCEBAD204FC346A1BEE10CD18DB058DF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure OIDC secrets exist
        shell: bash
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ] || [ -z "${AZURE_TENANT_ID}" ] || [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "Missing one or more Azure OIDC secrets:"
            echo "- AZUREAPPSERVICE_CLIENTID_DOCKER"
            echo "- AZUREAPPSERVICE_TENANTID_640FDCE7414E488197DE8F47BFFAD2AF"
            echo "- AZUREAPPSERVICE_SUBSCRIPTIONID_CCEBAD204FC346A1BEE10CD18DB058DF"
            exit 1
          fi

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve and login Azure Container Registry
        shell: bash
        run: |
          RAW_NAME="${ACR_LOGIN_SERVER%%.azurecr.io}"
          NORMALIZED_NAME="${RAW_NAME//-/}"
          RESOLVED_NAME=""
          RESOLVED_LOGIN_SERVER=""
          ZERO_GUID="00000000-0000-0000-0000-000000000000"

          for CANDIDATE in "$RAW_NAME" "$NORMALIZED_NAME"; do
            if [ -z "$CANDIDATE" ]; then
              continue
            fi
            if ! [[ "$CANDIDATE" =~ ^[a-zA-Z0-9]{5,50}$ ]]; then
              continue
            fi

            ACCESS_TOKEN=$(az acr login --name "$CANDIDATE" --expose-token --output tsv --query accessToken 2>/dev/null || true)
            if [ -n "$ACCESS_TOKEN" ]; then
              RESOLVED_NAME="$CANDIDATE"
              RESOLVED_LOGIN_SERVER="${CANDIDATE}.azurecr.io"

              echo "$ACCESS_TOKEN" | docker login "$RESOLVED_LOGIN_SERVER" \
                --username "$ZERO_GUID" \
                --password-stdin
              break
            fi
          done

          if [ -z "$RESOLVED_NAME" ] || [ -z "$RESOLVED_LOGIN_SERVER" ]; then
            echo "Unable to resolve ACR from configured login server: ${ACR_LOGIN_SERVER}"
            echo "Please verify the registry in Azure and set the correct value in this workflow."
            exit 1
          fi

          echo "ACR_NAME=${RESOLVED_NAME}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${RESOLVED_LOGIN_SERVER}" >> "$GITHUB_ENV"

      - name: Build Docker image with sand tag
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:sand \
            .

      - name: Push Docker image sand tag
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:sand

  deploy-to-webapp:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      id-token: write
      contents: read

    env:
      ACR_LOGIN_SERVER: acrtoolsforthetoughdays-baa3ghbcfdfjdghw.azurecr.io
      IMAGE_NAME: tools-for-the-tough-days
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DOCKER }}
      AZURE_TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_640FDCE7414E488197DE8F47BFFAD2AF }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CCEBAD204FC346A1BEE10CD18DB058DF }}

    steps:
      - name: Validate Azure OIDC secrets exist
        shell: bash
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ] || [ -z "${AZURE_TENANT_ID}" ] || [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "Missing one or more Azure OIDC secrets:"
            echo "- AZUREAPPSERVICE_CLIENTID_DOCKER"
            echo "- AZUREAPPSERVICE_TENANTID_640FDCE7414E488197DE8F47BFFAD2AF"
            echo "- AZUREAPPSERVICE_SUBSCRIPTIONID_CCEBAD204FC346A1BEE10CD18DB058DF"
            exit 1
          fi

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure Container Registry details
        shell: bash
        run: |
          RAW_NAME="${ACR_LOGIN_SERVER%%.azurecr.io}"
          NORMALIZED_NAME="${RAW_NAME//-/}"
          RESOLVED_LOGIN_SERVER=""

          for CANDIDATE in "$RAW_NAME" "$NORMALIZED_NAME"; do
            if [ -z "$CANDIDATE" ]; then
              continue
            fi
            if ! [[ "$CANDIDATE" =~ ^[a-zA-Z0-9]{5,50}$ ]]; then
              continue
            fi

            ACCESS_TOKEN=$(az acr login --name "$CANDIDATE" --expose-token --output tsv --query accessToken 2>/dev/null || true)
            if [ -n "$ACCESS_TOKEN" ]; then
              RESOLVED_LOGIN_SERVER="${CANDIDATE}.azurecr.io"
              break
            fi
          done

          if [ -z "$RESOLVED_LOGIN_SERVER" ]; then
            echo "Unable to resolve ACR from configured login server: ${ACR_LOGIN_SERVER}"
            exit 1
          fi

          echo "ACR_LOGIN_SERVER=${RESOLVED_LOGIN_SERVER}" >> "$GITHUB_ENV"

      - name: Deploy container image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Tools-for-the-Tough-Days-SAND
          slot-name: Production
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sand
