name: Build, Push, and Deploy Docker Image (SAND)

on:
  push:
    branches:
      - sand
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ACR_LOGIN_SERVER: acrtoolsforthetoughdays-baa3ghbcfdfjdghw.azurecr.io
      IMAGE_NAME: tools-for-the-tough-days

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_LOGIN_SERVER --username "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build Docker image with sand tag
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:sand \
            .

      - name: Push Docker image sand tag
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:sand

  deploy-to-webapp:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      id-token: write
      contents: read

    env:
      ACR_LOGIN_SERVER: acrtoolsforthetoughdays-baa3ghbcfdfjdghw.azurecr.io
      IMAGE_NAME: tools-for-the-tough-days

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7E6A4D7A5AF4F79BBCE42A6C3DB6424 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_640FDCE7414E488197DE8F47BFFAD2AF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CCEBAD204FC346A1BEE10CD18DB058DF }}

      - name: Deploy container image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Tools-for-the-Tough-Days-SAND
          slot-name: Production
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sand
