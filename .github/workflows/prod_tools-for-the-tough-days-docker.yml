name: (PROD) Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      id-token: write
      contents: read

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      IMAGE_NAME: tools-for-the-tough-days
      IMAGE_TAG: latest
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DOCKER }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANTID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTIONID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure OIDC config exists
        shell: bash
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ] || [ -z "${AZURE_TENANT_ID}" ] || [ -z "${AZURE_SUBSCRIPTION_ID}" ] || [ -z "${ACR_NAME}" ] || [ -z "${ACR_LOGIN_SERVER}" ] || [ -z "${IMAGE_TAG}" ]; then
            echo "Missing one or more required values:"
            echo "- AZUREAPPSERVICE_CLIENTID_DOCKER"
            echo "- AZURE_TENANTID (repository variable)"
            echo "- AZURE_SUBSCRIPTIONID (repository variable)"
            echo "- ACR_NAME (repository variable)"
            echo "- ACR_LOGIN_SERVER (repository variable)"
            echo "- IMAGE_TAG"
            exit 1
          fi

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry (OIDC test)
        shell: bash
        run: |
          az acr login --name "$ACR_NAME"

      - name: Build Docker image with latest tag
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            .
      - name: Push Docker image latest tag
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
  deploy-to-webapp:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    environment: Prod
    permissions:
      id-token: write
      contents: read

    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      IMAGE_NAME: tools-for-the-tough-days
      IMAGE_TAG: latest
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DOCKER }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANTID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTIONID }}

    steps:
      - name: Validate Azure OIDC config exists
        shell: bash
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ] || [ -z "${AZURE_TENANT_ID}" ] || [ -z "${AZURE_SUBSCRIPTION_ID}" ] || [ -z "${ACR_LOGIN_SERVER}" ] || [ -z "${IMAGE_TAG}" ]; then
            echo "Missing one or more Azure OIDC config values:"
            echo "- AZUREAPPSERVICE_CLIENTID_DOCKER"
            echo "- AZURE_TENANTID (repository variable)"
            echo "- AZURE_SUBSCRIPTIONID (repository variable)"
            echo "- ACR_LOGIN_SERVER (repository variable)"
            echo "- IMAGE_TAG"
            exit 1
          fi
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set App Service environment variables
        run: |
          az webapp config appsettings set \
            --name Tools-for-the-Tough-Days \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --settings \
              DB_HOST="${{ vars.DB_HOST }}" \
              DB_NAME="${{ vars.DB_NAME }}" \
              DB_PORT="${{ vars.DB_PORT }}" \
              DB_USER="${{ vars.DB_USER }}" \
              DB_PASS="${{ secrets.DB_PASS }}" \
              SMTP_HOST="${{ vars.SMTP_HOST }}" \
              SMTP_PORT="${{ vars.SMTP_PORT }}" \
              SMTP_USERNAME="${{ vars.SMTP_USERNAME }}" \
              SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              MAIL_FROM="${{ vars.MAIL_FROM }}" \
              MAIL_REPLY_TO="${{ vars.MAIL_REPLY_TO }}" \
              SITE_URL="${{ vars.SITE_URL }}" \
              CRON_SECRET="${{ secrets.CRON_SECRET }}" \
              RESOURCE_TOKEN_SECRET="${{ secrets.RESOURCE_TOKEN_SECRET }}" \
              RESOURCE_URL_TTL_SEC="${{ vars.RESOURCE_URL_TTL_SEC }}" \
              AZURE_STORAGE_ACCOUNT="${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              AZURE_STORAGE_CONTAINER="${{ vars.AZURE_STORAGE_CONTAINER }}" \
              AZURE_STORAGE_PREFIX="${{ vars.AZURE_STORAGE_PREFIX }}" \
              AZURE_STORAGE_ACCOUNT_KEY="${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
              AzureWebJobsStorage="${{ secrets.AZURE_WEB_JOBS_STORAGE }}" \
              STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              SUBSCRIPTION_EMAIL="${{ vars.SUBSCRIPTION_EMAIL }}" \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE="${{ vars.WEBSITES_ENABLE_APP_SERVICE_STORAGE }}" \
              WEBSITES_PORT="${{ vars.WEBSITES_PORT }}" \
              DOCKER_ENABLE_CI="${{ vars.DOCKER_ENABLE_CI }}" \
              DOCKER_REGISTRY_SERVER_URL="${{ vars.ACR_LOGIN_SERVER }}"

      - name: Deploy container image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Tools-for-the-Tough-Days
          slot-name: Production
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
